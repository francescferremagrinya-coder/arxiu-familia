const norm = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
const listEl=document.getElementById('list'), countEl=document.getElementById('count'), qEl=document.getElementById('q');
document.getElementById('total').textContent = DATA.length;

// attach links
DATA.forEach(it=>{ it.url = (ENLLACOS[it.clip]||'').trim(); });
const ambEnllac = DATA.filter(it=>it.url).length;
const banner=document.getElementById('banner');
if(ambEnllac===0){
  banner.className='banner warn';
  banner.innerHTML='Encara no hi ha cap enlla&ccedil; de v&iacute;deo afegit. Els botons diran &laquo;pendent&raquo; fins que s\'afegeixin.';
}else if(ambEnllac<DATA.length){
  banner.className='banner warn';
  banner.innerHTML='Hi ha <b>'+ambEnllac+'</b> de <b>'+DATA.length+'</b> v&iacute;deos enlla&ccedil;ats. La resta diran &laquo;pendent&raquo;.';
}else{
  banner.className='banner ok';
  banner.innerHTML='Tots els v&iacute;deos estan enlla&ccedil;ats. A gaudir dels records!';
}

function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function highlight(text, terms){
  let out=escapeHtml(text);
  terms.forEach(t=>{ if(!t)return;
    const re=new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    out=out.replace(re,'<mark>$1</mark>');
  });
  return out;
}
function playButton(it){
  if(it.url) return '<a class="play" href="'+it.url+'" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Veure el v&iacute;deo</a>';
  return '<span class="play missing"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg> Enlla&ccedil; pendent</span>';
}
function render(items, terms){
  if(!items.length){ listEl.innerHTML='<div class="empty"><div class="big">Cap resultat</div>Prova amb una altra paraula o un any.</div>'; return; }
  listEl.innerHTML=items.map(it=>'<article class="card"><div class="card-top"><span class="clip-badge">Cinta '+it.clip+'</span>'+(it.year?'<span class="year-badge">'+it.year+'</span>':'')+'</div><p class="desc">'+highlight(it.desc,terms)+'</p>'+playButton(it)+'</article>').join('');
}
function search(){
  const raw=qEl.value.trim();
  const terms=raw.split(/\s+/).filter(Boolean);
  const nterms=terms.map(norm);
  let res = !nterms.length ? DATA : DATA.filter(it=>{
    const hay=norm(it.desc+' '+it.clip+' '+(it.year||''));
    return nterms.every(t=>hay.includes(t));
  });
  countEl.innerHTML = raw ? '<b>'+res.length+'</b> '+(res.length===1?'cinta trobada':'cintes trobades') : 'Mostrant les <b>'+DATA.length+'</b> cintes';
  render(res, terms);
}
qEl.addEventListener('input', search);
search();
